<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="title desc">
  <title id="title">Zayt Mascot Layered Vector</title>
  <desc id="desc">Layered olive-oil droplet mascot for Hafiz. Separate groups: glow, body, arms, eyes, mouth, leaf.</desc>
  <defs>
    <radialGradient id="zayt_body_grad" cx="42%" cy="22%" r="74%">
      <stop offset="0%" stop-color="#FFF7CC"/>
      <stop offset="45%" stop-color="#F5D978"/>
      <stop offset="76%" stop-color="#C9A84A"/>
      <stop offset="100%" stop-color="#8F7832"/>
    </radialGradient>
    <radialGradient id="zayt_body_inner" cx="40%" cy="18%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#FFF8D8" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#B69235" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="zayt_leaf_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8C78D"/>
      <stop offset="55%" stop-color="#668347"/>
      <stop offset="100%" stop-color="#2F4E35"/>
    </linearGradient>
    <linearGradient id="zayt_gold_line" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF4B0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#C49A3A" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="zayt_glow_grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDDC91" stop-opacity="0.50"/>
      <stop offset="58%" stop-color="#FDDC91" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#FDDC91" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft_blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="soft_shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#003638" flood-opacity="0.09"/>
    </filter>
    <style>
      .stroke-soft { stroke-linecap: round; stroke-linejoin: round; }
      .outline { stroke: #7B6D39; stroke-width: 5; stroke-opacity: .52; }
      .face { fill: #253B2F; }
      .warm-line { stroke: #7B6D39; stroke-width: 6; stroke-opacity: .85; fill: none; }
      .arm-fill { fill: #D8BC62; stroke: #7B6D39; stroke-width: 4; stroke-opacity: .42; }
    </style>
  </defs>

  <g id="glow" data-layer="glow">
    <ellipse cx="256" cy="337" rx="150" ry="132" fill="url(#zayt_glow_grad)" filter="url(#soft_blur)" opacity="0.75"/>
    <ellipse cx="256" cy="438" rx="108" ry="18" fill="#003638" opacity="0.09" filter="url(#soft_blur)"/>
    <path d="M158 430 C210 452, 302 452, 354 430" fill="none" stroke="#FDDC91" stroke-width="4" stroke-opacity="0.46" class="stroke-soft"/>
    <path d="M181 409 C222 424, 290 424, 331 409" fill="none" stroke="#FDDC91" stroke-width="3" stroke-opacity="0.30" class="stroke-soft"/>
  </g>

  <g id="body" data-layer="body" filter="url(#soft_shadow)">
    <path id="body-main" d="M256 54
      C286 105 331 162 355 222
      C382 290 371 356 330 401
      C293 442 219 442 182 401
      C141 356 130 290 157 222
      C181 162 226 105 256 54 Z"
      fill="url(#zayt_body_grad)" class="outline stroke-soft"/>
    <path id="body-inner-light" d="M256 70
      C282 120 321 174 341 230
      C364 295 352 348 318 386
      C285 423 227 423 194 386
      C160 348 148 295 171 230
      C191 174 230 120 256 70 Z"
      fill="url(#zayt_body_inner)" opacity="0.82"/>
    <path id="body-left-highlight" d="M220 112 C193 162 177 206 174 252" fill="none" stroke="#FFF8D8" stroke-width="8" stroke-opacity="0.55" class="stroke-soft"/>
    <path id="body-small-highlight" d="M197 176 C189 194 185 211 183 230" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-opacity="0.55" class="stroke-soft"/>
    <ellipse id="body-bottom-soft" cx="256" cy="390" rx="78" ry="42" fill="#9B7D2F" opacity="0.10"/>
  </g>

  <g id="arms" data-layer="arms">
    <path id="left-arm" d="M165 310 C139 317 132 351 151 365 C168 376 184 355 181 335 C179 320 173 313 165 310 Z" class="arm-fill"/>
    <path id="right-arm" d="M347 310 C373 317 380 351 361 365 C344 376 328 355 331 335 C333 320 339 313 347 310 Z" class="arm-fill"/>
  </g>

  <g id="eyes" data-layer="eyes">
    <ellipse id="left-eye" cx="226" cy="286" rx="9" ry="12" class="face"/>
    <ellipse id="right-eye" cx="286" cy="286" rx="9" ry="12" class="face"/>
    <circle id="left-eye-highlight" cx="229" cy="282" r="2.2" fill="#FFFFFF" opacity="0.82"/>
    <circle id="right-eye-highlight" cx="289" cy="282" r="2.2" fill="#FFFFFF" opacity="0.82"/>
    <path id="left-brow" d="M212 263 C220 257 229 257 236 263" fill="none" stroke="#253B2F" stroke-width="4" stroke-opacity="0.72" class="stroke-soft"/>
    <path id="right-brow" d="M276 263 C284 257 293 257 300 263" fill="none" stroke="#253B2F" stroke-width="4" stroke-opacity="0.72" class="stroke-soft"/>
  </g>

  <g id="mouth" data-layer="mouth">
    <path id="mouth-smile" d="M239 319 C248 330 264 330 273 319" class="warm-line stroke-soft"/>
  </g>

  <g id="leaf" data-layer="leaf">
    <path id="stem" d="M254 58 C250 35 245 22 237 11" fill="none" stroke="#6D6A2D" stroke-width="7" stroke-opacity="0.82" class="stroke-soft"/>
    <path id="leaf-right" d="M257 47 C293 20 333 28 349 55 C313 75 282 69 257 47 Z" fill="url(#zayt_leaf_grad)" stroke="#2F4E35" stroke-width="4" stroke-opacity="0.55" class="stroke-soft"/>
    <path id="leaf-left" d="M247 42 C221 19 187 20 171 42 C199 62 224 60 247 42 Z" fill="url(#zayt_leaf_grad)" stroke="#2F4E35" stroke-width="4" stroke-opacity="0.55" class="stroke-soft"/>
    <path id="leaf-vein-right" d="M270 47 C294 45 316 48 338 55" fill="none" stroke="#D7E0B2" stroke-width="3" stroke-opacity="0.45" class="stroke-soft"/>
    <path id="leaf-vein-left" d="M235 42 C212 40 193 40 176 43" fill="none" stroke="#D7E0B2" stroke-width="3" stroke-opacity="0.45" class="stroke-soft"/>
  </g>
</svg>
