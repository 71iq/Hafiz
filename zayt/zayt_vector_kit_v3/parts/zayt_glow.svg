    <path d="M147 429 C196 457 316 457 365 429" class="soft-line" stroke="#FDDC91" stroke-width="4" stroke-opacity="0.42"/>
    <path d="M174 408 C214 426 298 426 338 408" class="soft-line" stroke="#FDDC91" stroke-width="3" stroke-opacity="0.30"/>
    <circle cx="359" cy="218" r="3.2" fill="#FFE8A8" opacity="0.65"/>
    <circle cx="381" cy="249" r="2" fill="#FFE8A8" opacity="0.45"/>
