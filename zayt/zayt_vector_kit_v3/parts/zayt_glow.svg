      <stop offset="45%" stop-color="#FFF9DD" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFF9DD" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="cheekGrad" cx="50%" cy="50%" r="50%">
