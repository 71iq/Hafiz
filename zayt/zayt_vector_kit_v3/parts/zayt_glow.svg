      .face{fill:#263C31}
      .face-stroke{stroke:#263C31;stroke-linecap:round;stroke-linejoin:round}
      .warm-stroke{stroke:#6E5E2C;stroke-linecap:round;stroke-linejoin:round}
      .leaf-stroke{stroke:#2D4E36;stroke-linecap:round;stroke-linejoin:round}
      .soft-line{fill:none;stroke-linecap:round;stroke-linejoin:round}
