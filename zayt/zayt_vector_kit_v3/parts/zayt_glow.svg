<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="title desc">
  <title id="title">Zayt glow layer v2</title>
  <desc id="desc">Separate glow layer. Same 512 by 512 viewBox; stack with the master or other parts.</desc>

  <defs>
    <radialGradient id="bodyGold3D" cx="42%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#FFF9D8"/>
      <stop offset="28%" stop-color="#F9E79E"/>
      <stop offset="62%" stop-color="#E3C260"/>
      <stop offset="86%" stop-color="#B9983E"/>
      <stop offset="100%" stop-color="#7B692F"/>
    </radialGradient>
    <radialGradient id="bodyCenterLight" cx="47%" cy="37%" r="52%">
      <stop offset="0%" stop-color="#FFFCEE" stop-opacity="0.86"/>
      <stop offset="55%" stop-color="#FFF0B4" stop-opacity="0.23"/>
      <stop offset="100%" stop-color="#FFF0B4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bodyEdgeWarmth" cx="52%" cy="70%" r="56%">
